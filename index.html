<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature coverter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- main container -->
    <div class="container">
        <h2>🌡️ Temperature Converter</h2>
        <input type="number" id="temperature" placeholder="Enter Value">

        <button id="btnFehren" >Convert to C&deg;</button>
        <button id="btnCelsius">Convert to F&deg;</button>
    </div>
    <!-- empty heading for answer -->
    <h3 id="result"></h3>
    </div>
<!-- javascript -->
<script src="script.js"></script>
</body>
</html>
